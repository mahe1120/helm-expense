apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: expense
  labels:
    app: mysql
    project: expense
    tier: db
spec:
  clusterIP: None   # For statefulset cluster IP should be None
  selector:
    app: mysql
    project: expense
    tier: db
  ports:
  - protocol: TCP 
    port: 3306
    targetPort: 3306
